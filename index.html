<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EVT-SOL</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #f5f7fb, #e9eef7);
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 90%;
      max-width: 760px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
      padding: 56px 40px;
      text-align: center;
      box-sizing: border-box;
    }

    .logo {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #0f766e;
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 18px;
      color: #4b5563;
      margin-bottom: 36px;
    }

    .status {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 999px;
      background: #ecfdf5;
      color: #047857;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 28px;
    }

    h1 {
      font-size: 42px;
      margin: 0 0 18px 0;
      color: #111827;
    }

    p {
      font-size: 17px;
      line-height: 1.7;
      margin: 0;
      color: #374151;
    }

    .footer {
      margin-top: 42px;
      font-size: 14px;
      color: #6b7280;
    }

    @media (max-width: 600px) {
      .container {
        padding: 40px 24px;
      }

      h1 {
        font-size: 32px;
      }

      .logo {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="logo">EVT-SOL</div>
    <div class="subtitle">Elevate Operating Solution LLC</div>

    <div class="status">Website Under Construction</div>

    <h1>Coming Soon</h1>

    <p>
      Our public website is currently being prepared.<br />
      Please check back soon for updates.
    </p>

    <div class="footer">
      © 2026 Elevate Operating Solution LLC. All rights reserved.
    </div>
  </main>
</body>
</html>
